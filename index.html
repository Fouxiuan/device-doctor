<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设备诊疗师 — 异常闭环与知识管家</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/knowledge.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>
  <!-- 导航栏 -->
  <header class="app-header">
    <div class="header-left">
      <span class="logo">📊 设备诊疗师</span>
    </div>
    <nav class="header-nav">
      <a href="#dashboard" class="nav-link active" data-view="dashboard">状态看板</a>
      <a href="#knowledge" class="nav-link" data-view="knowledge">知识库</a>
    </nav>
    <div class="header-actions">
      <button id="btn-add-issue" class="btn btn-primary">+ 新增异常</button>
      <button id="btn-export" class="btn btn-outline">导出数据</button>
      <button id="btn-import" class="btn btn-outline">导入数据</button>
      <input type="file" id="file-import" accept=".json" style="display:none">
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="app-main">
    <section id="view-dashboard" class="view active"></section>
    <section id="view-knowledge" class="view"></section>
  </main>

  <!-- 弹窗容器 -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div id="modal-container" class="modal-container"></div>
  </div>

  <!-- JS 模块（按依赖顺序加载） -->
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/knowledge.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
